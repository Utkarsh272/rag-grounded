name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: api
        run: uv sync --frozen

      - name: Lint with ruff
        working-directory: api
        run: uv run ruff check app/ || true

      - name: Import smoke test
        working-directory: api
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_KEY: placeholder
          GROQ_API_KEY: placeholder
          LLM_PROVIDER: groq
        run: |
          uv run python -c "
          from app.ingestion.chunker import chunk_text
          from app.generation.citation_parser import parse_citations
          from app.verification.abstention import should_abstain
          print('All imports OK')
          "

  web:
    name: Web — lint + type check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack and install pnpm from packageManager field
        working-directory: web
        run: |
          corepack enable
          corepack prepare --activate

      - name: Install dependencies
        working-directory: web
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        working-directory: web
        run: pnpm exec tsc --noEmit

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm build

  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build ./api -t rag-api:ci

      - name: Build web image
        run: docker build ./web -t rag-web:ci --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000
