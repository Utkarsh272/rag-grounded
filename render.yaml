# render.yaml
services:
  - type: web
    name: rag-grounded-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "10000"
      - key: LLM_PROVIDER
        value: groq
      - key: ABSTAIN_RERANK_THRESHOLD
        value: "-6.0"
      - key: ABSTAIN_JACCARD_THRESHOLD
        value: "0.08"
      - key: CLAIM_CONFIDENCE_THRESHOLD
        value: "0.50"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
