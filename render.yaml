# render.yaml — Render.com deployment config for the FastAPI backend.
# Connect your GitHub repo to Render, then Render will read this file automatically.
#
# Free tier note: Render free web services spin down after 15 min of inactivity.
# Cold starts take ~30s. This is acceptable for a portfolio demo.
# Set the following env vars in the Render dashboard (not here — never commit secrets):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, GROQ_API_KEY, ANTHROPIC_API_KEY,
#   LLM_PROVIDER, ALLOWED_ORIGINS

services:
  - type: web
    name: rag-grounded-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: ALLOWED_ORIGINS
        sync: false   # set in Render dashboard — your Vercel URL
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ABSTAIN_RERANK_THRESHOLD
        value: "-6.0"
      - key: ABSTAIN_JACCARD_THRESHOLD
        value: "0.08"
      - key: CLAIM_CONFIDENCE_THRESHOLD
        value: "0.50"
